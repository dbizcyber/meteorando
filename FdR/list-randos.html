<style>

body{
font-family:Arial;
margin:30px;
}

/* zone recherche moderne */

.searchBox{
position:relative;
max-width:600px;
margin-bottom:25px;
}

.searchBox input{
width:100%;
padding:12px 40px 12px 15px;
border-radius:25px;
border:1px solid #ccc;
font-size:16px;
outline:none;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
transition:0.2s;
}

.searchBox input:focus{
border-color:#4CAF50;
box-shadow:0 4px 10px rgba(0,0,0,0.15);
}

.searchBox span{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
font-size:18px;
opacity:0.6;
}

/* randos */

pre{
white-space:pre-wrap;
font-family:Arial;
background:#f6f6f6;
padding:12px;
border-radius:6px;
margin-bottom:20px;
}

.titre{
font-weight:bold;
cursor:pointer;
background:#eee;
padding:10px;
border-radius:6px;
margin-bottom:5px;
white-space:pre-wrap;
}

.profil{
max-width:600px;
margin-top:10px;
margin-bottom:10px;
border-radius:6px;
}

</style>


<div class="searchBox">
<input id="search" placeholder="Rechercher un village, une rando, un terme spécifique">
<span>🔍</span>
</div>

<div id="liste"></div>


<script>

const url="https://whlxbfnmyqdflmxosfse.supabase.co/rest/v1/randos_lst"

const key="TA_CLE_SUPABASE"

/* url du bucket */

const bucket =
"https://whlxbfnmyqdflmxosfse.supabase.co/storage/v1/object/public/Courbe/"

async function load(q=""){

let query=url+"?select=resume,profil"

if(q){
query += `&resume=ilike.*${q}*`
}

const res=await fetch(query,{
headers:{apikey:key}
})

const data=await res.json()

const container=document.getElementById("liste")
container.innerHTML=""

data.forEach(r=>{

const bloc=document.createElement("div")

const lignes=r.resume.split("\n")

const titre=document.createElement("div")
titre.className="titre"
titre.textContent=lignes.slice(0,3).join("\n")

const pre=document.createElement("pre")
pre.textContent=r.resume
pre.style.display="none"

/* image profil */

let img=null

if(r.profil){

img=document.createElement("img")
img.className="profil"
img.src=bucket + r.profil
img.style.display="none"

}

titre.onclick=()=>{

const ouvert = pre.style.display==="block"

pre.style.display = ouvert ? "none" : "block"

if(img){
img.style.display = ouvert ? "none" : "block"
}

}

bloc.appendChild(titre)

if(img) bloc.appendChild(img)

bloc.appendChild(pre)

container.appendChild(bloc)

})

}

document
.getElementById("search")
.addEventListener("input",e=>load(e.target.value))

load()

</script>
