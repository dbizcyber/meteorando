body{

/* zone recherche moderne */

.searchBox{
position:relative;
max-width:400px;
margin-bottom:25px;
}

.searchBox input{
width:100%;
padding:12px 40px 12px 15px;
border-radius:25px;
border:1px solid #ccc;
font-size:16px;
outline:none;
box-shadow:0 2px 6px rgba(0,0,0,0.1);

/* randos */

pre{
white-space: pre-wrap;
font-family: Arial;
background:#f6f6f6;
padding:12px;
border-radius:6px;
margin-bottom:20px;
}

.titre{
font-weight:bold;
cursor:pointer;
background:#eee;
padding:10px;
border-radius:6px;
margin-bottom:5px;

}

</style>


<div class="searchBox">
<input id="search" placeholder="Rechercher un village ou une rando">
<span>🔍</span>
</div>

<div id="liste"></div>


<script>

const url="https://whlxbfnmyqdflmxosfse.supabase.co/rest/v1/randos_lst"

const key="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndobHhiZm5teXFkZmxteG9zZnNlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3ODA5MTksImV4cCI6MjA4ODM1NjkxOX0.vf3sdnJRnnXyIx998fhPSIUPX0WS7KqDbvAwesCzOcE"

async function load(q=""){

let query=url

if(q){
query += `?resume=ilike.*${q}*`
}

const res=await fetch(query,{
headers:{apikey:key}
})

const data=await res.json()

const container=document.getElementById("liste")
container.innerHTML=""

data.forEach(r=>{

const bloc=document.createElement("div")

const lignes=r.resume.split("\n")

const titre=document.createElement("div")
titre.className="titre"
titre.textContent=lignes.slice(0,3).join("\n")

const pre=document.createElement("pre")
pre.textContent=r.resume
pre.style.display="none"

titre.onclick=()=>{
pre.style.display =
pre.style.display==="none" ? "block" : "none"
}

bloc.appendChild(titre)
bloc.appendChild(pre)

container.appendChild(bloc)

})

}

document
.getElementById("search")
.addEventListener("input",e=>load(e.target.value))

load()

</script>
